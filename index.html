<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>LUNO - Any game. One platform.</title>
      <meta name="description" content="LUNO: A unified scripting system for any 64-bit game. Write cheats, publish your scripts, and earn.">
      <link rel="icon" type="image/x-icon" href="icon.ico">
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
      <style>
         *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
         :root{--bg:#07080d;--acc:#8b70e8;--hi:#dddaf8;--txt:#6c7290;--mid:#9098b8;--dim:#1e2135;--bord:#1c1f32}
         html,body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
         .bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 12% 18%,rgba(180,180,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 78% 7%,rgba(180,180,255,.35) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 90% 32%,rgba(180,180,255,.45) 0%,transparent 100%),radial-gradient(1px 1px at 4% 68%,rgba(180,180,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 95% 82%,rgba(180,180,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 35% 4%,rgba(180,180,255,.45) 0%,transparent 100%),radial-gradient(1px 1px at 58% 91%,rgba(180,180,255,.25) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 48% 12%,rgba(180,180,255,.55) 0%,transparent 100%),radial-gradient(1px 1px at 83% 58%,rgba(180,180,255,.25) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 28% 60%,rgba(180,180,255,.4) 0%,transparent 100%)}
         .wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center}
         .inner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 24px;width:100%;max-width:640px}
         .wordmark{font-size:14px;font-weight:600;letter-spacing:.16em;color:var(--mid);display:block;margin-bottom:48px}
         .slogan{font-size:clamp(38px,6vw,68px);font-weight:700;color:var(--hi);letter-spacing:-.03em;line-height:1.05;display:block;margin-bottom:28px}
         .slogan em{font-style:normal;color:var(--acc)}
         .sub{font-size:16px;line-height:1.75;max-width:440px;display:block;margin-bottom:48px}
         .projects{width:100%;max-width:560px;margin:0 0 52px;display:flex;flex-direction:column;align-items:center;gap:22px}
         .proj-line{font-size:14px;line-height:1.6;max-width:440px;text-align:center}
         .row{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
         .cover{flex:0 0 auto;width:148px;height:222px;border-radius:10px;overflow:hidden;border:1px solid var(--bord);background:#0a0c14;position:relative;transition:transform .4s ease,border-color .4s ease,box-shadow .4s ease}
         .cover img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.9) brightness(.85);transition:filter .4s ease,transform .6s ease}
         .cover:hover{transform:translateY(-6px);border-color:rgba(139,112,232,.5);box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 40px rgba(139,112,232,.22)}
         .cover:hover img{filter:saturate(1.05) brightness(1);transform:scale(1.04)}
         .eta{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
         .eta-label{font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
         .eta-date{font-size:22px;font-weight:600;color:var(--hi);letter-spacing:-.01em}
         .note{font-size:11px;color:var(--dim);letter-spacing:.04em;display:block;text-transform:uppercase}
      </style>
   </head>
   <body>
      <div class="bg"></div>
      <div class="wrap">
         <div class="inner">
            <h1 class="wordmark">LUNO</h1>
            <h2 class="slogan">Any game.<br><em>One platform.</em></h2>
            <span class="sub">A unified scripting system for any 64-bit game. Write cheats, publish your scripts, and earn; or simply use the community's best.</span>
            <div class="projects" aria-label="Supported projects">
               <p class="proj-line">We also support dedicated projects for the following games:</p>
               <div class="row">
				  <div class="cover"><img src="covers/cs2.jpg" alt="Counter-Strike 2" loading="lazy" draggable="false"></div>
                  <div class="cover"><img src="covers/gmod.jpg" alt="Garry's Mod" loading="lazy" draggable="false"></div>
                  <div class="cover"><img src="covers/ohdeer.jpg" alt="Oh Deer" loading="lazy" draggable="false"></div>
               </div>
            </div>
            <div class="eta">
               <span class="eta-label">First invitation wave</span>
               <span class="eta-date">November 1, 2026</span>
            </div>
            <span class="note">Invite only &nbsp;·&nbsp; soon™</span>
         </div>
      </div>
   </body>
</html>
